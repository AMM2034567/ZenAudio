# ZenAudio CI/CD 构建配置
# 支持 Windows (MSVC) 和 Linux (GNU) 平台的 Release 编译

name: Build and Release

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'  # 当推送版本标签时触发 Release
  pull_request:
    branches: [ main, master ]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # 启用 Rust 缓存以加速构建
  CARGO_INCREMENTAL: 0

jobs:
  # ============================================
  # Linux 构建任务 (使用 GNU 工具链)
  # ============================================
  build-linux:
    runs-on: ubuntu-latest
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
      
      - name: 安装系统依赖
        run: |
          # 更新包索引
          sudo apt-get update
          
          # 安装 ALSA 开发库（CPAL 在 Linux 上需要）
          sudo apt-get install -y libasound2-dev pkg-config
          
          # 安装其他可能的音频后端依赖
          sudo apt-get install -y libjack-jackd2-dev libpulse-dev
          
          # 安装 clang（某些 Rust 依赖可能需要）
          sudo apt-get install -y clang
      
      - name: 安装 Rust 工具链
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          components: rustfmt, clippy
      
      - name: 缓存 Cargo 依赖
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          shared-key: linux-release
      
      - name: 代码格式化检查
        run: cargo fmt --all -- --check
      
      - name: 代码静态分析
        run: cargo clippy --workspace --all-targets -- -D warnings
      
      - name: 构建 Release 版本
        run: cargo build --release --verbose
      
      - name: 运行测试（如果有）
        run: cargo test --release --verbose || true  # 测试失败不阻断发布
      
      - name: 检查二进制文件
        run: |
          ls -lh target/release/zenaudio
          file target/release/zenaudio
          # 显示文件大小
          du -h target/release/zenaudio
      
      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: zenaudio-linux-gnu
          path: target/release/zenaudio
          retention-days: 30
          if-no-files-found: error

  # ============================================
  # Windows 构建任务 (使用 MSVC 工具链)
  # ============================================
  build-windows:
    runs-on: windows-latest
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
      
      - name: 安装 Rust 工具链
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable-x86_64-pc-windows-msvc
          components: rustfmt, clippy
      
      - name: 缓存 Cargo 依赖
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          shared-key: windows-release
      
      - name: 代码格式化检查
        run: cargo fmt --all -- --check
      
      - name: 代码静态分析
        run: cargo clippy --workspace --all-targets -- -D warnings
      
      - name: 构建 Release 版本
        run: cargo build --release --verbose
      
      - name: 运行测试（如果有）
        run: cargo test --release --verbose || true
      
      - name: 检查二进制文件
        run: |
          dir target\release\zenaudio.exe
          # PowerShell 显示文件大小
          (Get-Item target\release\zenaudio.exe).Length / 1KB
      
      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: zenaudio-windows-msvc
          path: target/release/zenaudio.exe
          retention-days: 30
          if-no-files-found: error

  # ============================================
  # macOS 构建任务（可选，如有需要可启用）
  # ============================================
  build-macos:
    runs-on: macos-latest
    if: false  # 默认禁用，需要时改为 true
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
      
      - name: 安装 Rust 工具链
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
      
      - name: 缓存 Cargo 依赖
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          shared-key: macos-release
      
      - name: 构建 Release 版本
        run: cargo build --release --verbose
      
      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: zenaudio-macos
          path: target/release/zenaudio
          retention-days: 30

  # ============================================
  # 创建 GitHub Release（仅当推送标签时）
  # ============================================
  create-release:
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    
    permissions:
      contents: write  # 需要写入权限来创建 Release
    
    steps:
      - name: 下载 Linux 构建产物
        uses: actions/download-artifact@v4
        with:
          name: zenaudio-linux-gnu
          path: ./artifacts/linux
      
      - name: 下载 Windows 构建产物
        uses: actions/download-artifact@v4
        with:
          name: zenaudio-windows-msvc
          path: ./artifacts/windows
      
      - name: 打包 Linux 版本
        run: |
          cd ./artifacts/linux
          chmod +x zenaudio
          tar -czvf ../zenaudio-linux-gnu.tar.gz zenaudio
          cd ../..
      
      - name: 打包 Windows 版本
        run: |
          cd ./artifacts/windows
          zip ../zenaudio-windows-msvc.zip zenaudio.exe
          cd ../..
      
      - name: 创建 GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/zenaudio-linux-gnu.tar.gz
            artifacts/zenaudio-windows-msvc.zip
          draft: false
          prerelease: ${{ contains(github.ref, '-pre') }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ============================================
  # 发布到 Cargo（可选，如需发布到 crates.io）
  # ============================================
  publish-cargo:
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') && false  # 默认禁用
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
      
      - name: 安装 Rust
        uses: dtolnay/rust-toolchain@stable
      
      - name: 发布到 crates.io
        run: cargo publish --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
